<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>首答 AnswerOne · 内容生成</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/theme.js?v=20260529"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="font-sans bg-canvas text-offblack antialiased">
  <div id="sidebar-root"></div>

  <div class="pl-60">
    <header class="h-16 bg-canvas/85 backdrop-blur border-b border-line sticky top-0 z-10 flex items-center px-8">
      <h1 class="font-display text-lg font-bold tracking-tighter">内容生成</h1>
    </header>

    <main class="p-8 mx-auto w-full max-w-[1280px] bg-page-wash">
      <!-- ============ 生成区（选题 + 平台多选 + 一键生成）============ -->
      <section class="bg-surface border border-line rounded-2xl shadow-card p-5 mb-5">
        <div class="flex items-center gap-2 mb-1.5">
          <span class="text-sm font-medium">选题</span>
          <span id="gen-from" class="hidden text-[11.5px] text-primary">· 来自诊断缺口 <a href="06-诊断详情.html" class="underline underline-offset-2">返回报告</a></span>
        </div>
        <input id="gen-topic" placeholder="想补什么内容？例如：杭州手作奶茶哪家用真奶" value="杭州手作奶茶哪家用真奶"
          class="w-full px-3.5 h-11 rounded-lg border border-line text-sm outline-none transition focus:border-primary focus:ring-2 focus:ring-primary/20" />

        <div class="mt-4 mb-2 text-sm font-medium">发布平台 <span class="text-[11.5px] text-muted font-normal">· 可多选，AI 按各平台格式各出一版（＝信源里 AI 取数的平台）</span></div>
        <div id="gen-platform-pick" class="flex flex-wrap gap-2">
          <button data-val="xiaohongshu" class="gp"></button>
          <button data-val="dianping" class="gp"></button>
          <button data-val="douyin" class="gp"></button>
          <button data-val="gzh" class="gp"></button>
          <button data-val="zhihu" class="gp"></button>
        </div>

        <div class="mt-4 flex items-center gap-3 flex-wrap">
          <p class="text-[12px] text-muted inline-flex items-center gap-1.5"><svg viewBox="0 0 24 24" class="w-3.5 h-3.5 shrink-0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16.5h.01"/></svg>语气按平台自动适配，生成后可直接改文案</p>
          <button id="gen-run" class="ml-auto h-11 px-6 rounded-xl bg-brand-gradient text-white text-sm font-semibold inline-flex items-center gap-2 shadow-brand transition-transform hover:-translate-y-0.5 active:translate-y-0 outline-none focus-visible:ring-2 focus-visible:ring-primary/40">
            <svg viewBox="0 0 24 24" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3v4M3 5h4M6 17v4m-2-2h4M13 3l2.5 6.5L22 12l-6.5 2.5L13 21l-2.5-6.5L4 12l6.5-2.5L13 3Z"/></svg>
            一键生成<span id="gen-run-n" class="opacity-85"></span>
          </button>
        </div>
      </section>

      <!-- ============ 结果区 · 三态 ============ -->
      <!-- 空状态 -->
      <section id="gen-empty" class="bg-surface border border-line rounded-2xl shadow-card p-12 text-center">
        <div class="w-14 h-14 mx-auto rounded-2xl bg-primary/10 text-primary grid place-items-center mb-4">
          <svg viewBox="0 0 24 24" class="w-7 h-7" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M13 3 2.5 14H11l-1 7 10.5-11H13l0-7Z"/></svg>
        </div>
        <div class="font-display font-bold text-lg tracking-tight">选好平台，点「一键生成」</div>
        <p class="text-sm text-secondary mt-2 max-w-md mx-auto leading-relaxed">AI 会按每个平台的格式<b class="text-offblack font-medium">各出一版</b>——小红书出 3:4 九图 + emoji 标题、知乎出长答案、公众号出长图文……一次生成，多平台直接可用。</p>
      </section>

      <!-- 生成中 -->
      <section id="gen-loading" class="hidden bg-surface border border-line rounded-2xl shadow-card p-12 text-center">
        <svg viewBox="0 0 24 24" class="w-9 h-9 mx-auto text-primary animate-spin" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.2-8.5" stroke-linecap="round"/></svg>
        <div id="loading-text" class="mt-4 font-medium">正在生成…</div>
        <div id="loading-pills" class="flex flex-wrap justify-center gap-2 mt-3"></div>
      </section>

      <!-- 已生成：多平台结果标签页 -->
      <section id="gen-result" class="hidden bg-surface border border-line rounded-2xl shadow-card">
        <div class="flex items-center justify-between gap-3 px-5 h-14 border-b border-line">
          <div class="flex items-center gap-2 min-w-0">
            <span class="text-sm text-secondary inline-flex items-center gap-2 shrink-0"><span class="w-1.5 h-1.5 rounded-full bg-success"></span>已生成 ·</span>
            <div id="result-tabs" class="flex items-center gap-1 overflow-x-auto"></div>
          </div>
          <div class="flex items-center gap-2 shrink-0">
            <button id="gen-regen" data-toast="正在按当前选题重新生成（演示）" data-toast-type="info" class="h-9 px-3 rounded-lg border border-line text-xs font-medium inline-flex items-center gap-1.5 transition hover:bg-line/50"><svg viewBox="0 0 24 24" class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-3-6.7L21 8m0-5v5h-5" stroke-linecap="round" stroke-linejoin="round"/></svg>重新生成</button>
            <a id="save-all" href="08-内容库.html?new=1" data-toast="多平台内容已全部入库（演示）" class="h-9 px-4 rounded-xl bg-brand-gradient text-white text-sm font-semibold grid place-items-center shadow-brand transition-transform hover:-translate-y-0.5 active:translate-y-0">全部入库</a>
          </div>
        </div>
        <div id="result-panels"></div>
      </section>
    </main>
  </div>

  <script src="assets/app.js?v=20260529h"></script>
  <script>
    mountShell('gen');
  </script>
  <script>
    // ——— 07 内容生成 · 选题 → 一键生成 → 多平台结果（演示版）———
    (function () {
      const $ = (id) => document.getElementById(id);

      // 平台格式预设：L1 比例/字数/标签 + L2 灵魂格式（与 08/10 一致）
      const PLATFORMS = {
        xiaohongshu: { name: '小红书', primary: 'image', ratioCSS: '3/4', imgRatio: '3:4', cols: 3, panelImgs: 6, vidRatioCSS: '9/16', vidBadge: '9:16 · ≤15min', title: 20, body: 1000, tag: '#话题#', tagMax: 10, soul: '3:4 竖图 + emoji 标题 + 9 图集，第一张封面定生死' },
        douyin:      { name: '抖音', primary: 'video', ratioCSS: '9/16', imgRatio: '9:16', cols: 3, panelImgs: 3, vidRatioCSS: '9/16', vidBadge: '9:16 · 15–60s', title: 55, body: 2200, tag: '#话题', tagMax: 10, soul: '竖屏 15–60s，前 3 秒钩子 + 全屏字幕 + BGM 卡点' },
        dianping:    { name: '大众点评', primary: 'image', ratioCSS: '4/3', imgRatio: '4:3', cols: 3, panelImgs: 4, title: 30, body: 1000, tag: '关键词', tagMax: 5, warn: true, soul: '真实探店：评分 + 人均 + 推荐菜 + 环境图，挂 POI 承接「附近 + 品类」搜索' },
        gzh:         { name: '公众号', primary: 'text', ratioCSS: '2.35/1', imgRatio: '2.35:1', cols: 1, panelImgs: 1, vidRatioCSS: '16/9', vidBadge: '16:9 · 1–30min', title: 64, body: 0, tag: '无原生标签', tagMax: 0, soul: '2.35:1 头条封面 + 长图文 + 小标题分段 + 文末关注引导' },
        zhihu:       { name: '知乎', primary: 'text', ratioCSS: '16/9', imgRatio: '16:9', cols: 2, panelImgs: 2, vidRatioCSS: '16/9', vidBadge: '16:9 · 1–10min', title: 100, body: 0, tag: '关键词', tagMax: 5, soul: '长答案：论据 + 数据 + 个人经历四件套，正文越长权重越高（甜区内）' },
      };
      const DEMO = {
        xiaohongshu: { title: '杭州奶茶天花板🧋茉莉奶绿真奶党狂喜', tags: ['杭州奶茶', '手作鲜奶', '茉莉奶绿', '探店'],
                       body: '在杭州想喝杯靠谱奶茶？这家「茶语时光」必须冲！\n🧋主打茉莉奶绿，手作鲜奶不是奶精，茶香超明显\n📍市中心，逛街歇脚刚刚好\n姐妹们冲就完事了～' },
        douyin:      { title: '在杭州喝了10家奶茶，这家真奶的茉莉奶绿封神', tags: ['杭州奶茶', '探店', '茉莉奶绿'],
                       body: '前 3 秒钩子台词：「杭州本地人常喝、却很少被推荐的一家」\n全屏字幕逐句跟读 + 卡点 BGM，文案区只放钩子不放正文。' },
        dianping:    { title: '茶语时光｜茉莉奶绿真材实料，逛街歇脚首选', tags: ['茉莉奶绿', '手作鲜奶', '环境好'],
                       body: '人均 18 元 ｜ 推荐：茉莉奶绿、手作厚乳\n用的是手作鲜奶不是奶精，茶香明显不齁甜；门店在市中心，环境干净适合坐下歇脚。\n（挂门店 POI，承接「附近奶茶」搜索）' },
        gzh:         { title: '在杭州，怎么挑一杯真材实料的手作奶茶？', tags: [],
                       body: '## 为什么大多数奶茶喝起来都一个味\n奶精 + 香精的组合，甜度盖过茶香……\n## 手作鲜奶差在哪\n茶语时光用的是当日鲜奶现萃茶汤……\n## 三个方法判断一家店用没用真奶\n看挂壁、看茶香、看价签……\n（文末：关注「茶语时光」，回复"门店"领新人券）' },
        zhihu:       { title: '杭州有哪些值得喝的手作奶茶店？（附「真奶」判断方法）', tags: ['杭州', '奶茶', '手作鲜奶'],
                       body: '先给结论：手作鲜奶 + 现萃茶汤，是一杯奶茶好不好喝的关键。\n\n一、为什么真奶重要（数据）：奶精的反式脂肪……\n二、实测对比：我在杭州喝了 8 家……\n三、个人经历：作为在杭州待了 5 年的奶茶党……\n（论据 + 数据 + 个人经历四件套，正文越长权重越高）' },
      };
      const FORM_LABEL = { text: '文字', image: '图文', video: '视频' };
      const ORDER = ['xiaohongshu', 'dianping', 'douyin', 'gzh', 'zhihu'];

      const GRADS = ['linear-gradient(135deg,#EFF4FF,#C7D8FF)', 'linear-gradient(135deg,#FEF3F2,#FBD9D3)', 'linear-gradient(135deg,#ECFDF5,#C7EFD8)', 'linear-gradient(135deg,#FFFBEB,#FCE9B8)', 'linear-gradient(135deg,#F0FDFA,#99F6E4)', 'linear-gradient(135deg,#FFF7ED,#FED7AA)'];
      const CAPS = ['门店招牌 + 门口街景', '茉莉奶绿成品特写', '手作鲜奶制作过程', '店内环境与座位', '出杯特写 + 价格牌', '人均 + 推荐菜'];

      const state = { topic: '', platforms: ['xiaohongshu', 'dianping'], active: null };

      // —— 平台多选 chip 渲染 ——
      function paintPicks() {
        $('gen-platform-pick').querySelectorAll('.gp').forEach((b) => {
          const k = b.dataset.val, on = state.platforms.indexOf(k) >= 0;
          b.textContent = PLATFORMS[k].name;
          b.className = 'gp h-9 px-3.5 rounded-lg border text-[13px] font-medium transition inline-flex items-center gap-1.5 ' +
            (on ? 'border-primary bg-primary/5 text-primary' : 'border-line text-secondary hover:border-secondary/40');
        });
        $('gen-run-n').textContent = state.platforms.length ? ' · ' + state.platforms.length + ' 个平台' : '';
      }
      // —— 媒体区（按平台主推形态）——
      function imgFigure(ratioCSS, grad, badge, cap) {
        return '<figure class="group relative rounded-lg overflow-hidden border border-line">' +
          '<div class="grid place-items-center" style="aspect-ratio:' + ratioCSS + ';background:' + grad + '">' +
            '<svg viewBox="0 0 24 24" class="w-7 h-7" style="color:rgba(37,99,235,.4)" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-5-5L5 21"/></svg>' +
          '</div>' +
          '<span class="absolute top-2 left-2 px-1.5 h-5 grid place-items-center rounded bg-black/40 text-white text-[10px] font-medium backdrop-blur">' + badge + '</span>' +
          '<div class="absolute inset-0 grid grid-flow-col gap-2 place-items-center bg-black/40 opacity-0 group-hover:opacity-100 transition">' +
            '<button class="img-act w-8 h-8 rounded-full bg-white/90 text-offblack grid place-items-center shadow-card hover:bg-white" data-act="download" title="下载"><svg viewBox="0 0 24 24" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0 4-4m-4 4-4-4M5 21h14"/></svg></button>' +
            '<button class="img-act w-8 h-8 rounded-full bg-white/90 text-offblack grid place-items-center shadow-card hover:bg-white" data-act="regen" title="重生成"><svg viewBox="0 0 24 24" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-3-6.7L21 8m0-5v5h-5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>' +
          '</div>' +
          '<figcaption class="px-2.5 py-1.5 text-[11px] text-secondary border-t border-hairline truncate">' + cap + '</figcaption>' +
        '</figure>';
      }
      function media(key, p) {
        if (p.primary === 'image') {
          let figs = '';
          for (let i = 0; i < p.panelImgs; i++) figs += imgFigure(p.ratioCSS, GRADS[i % GRADS.length], 'AI · ' + p.imgRatio, CAPS[i % CAPS.length]);
          return '<div class="grid gap-3 mb-4" style="grid-template-columns:repeat(' + p.cols + ',minmax(0,1fr))">' + figs + '</div>';
        }
        if (p.primary === 'video') {
          return '<div class="mb-4 relative rounded-xl overflow-hidden border border-line" style="max-width:208px;aspect-ratio:' + p.vidRatioCSS + ';background:linear-gradient(160deg,#1E293B,#2563EB)">' +
            '<div class="absolute inset-0" style="background:radial-gradient(120% 60% at 50% 0%, rgba(255,255,255,0.18), transparent)"></div>' +
            '<span class="absolute top-2.5 left-2.5 px-1.5 h-5 grid place-items-center rounded bg-black/40 text-white text-[10px] font-medium backdrop-blur">' + p.vidBadge + '</span>' +
            '<button data-toast="播放预览（演示）" data-toast-type="info" class="absolute inset-0 grid place-items-center"><span class="w-12 h-12 rounded-full bg-white/20 ring-1 ring-white/40 backdrop-blur grid place-items-center"><svg viewBox="0 0 24 24" class="w-5 h-5 text-white translate-x-0.5" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></span></button>' +
          '</div>';
        }
        if (key === 'gzh') {
          return '<div class="mb-4 rounded-lg overflow-hidden border border-line grid place-items-center" style="aspect-ratio:2.35/1;background:linear-gradient(135deg,#EFF4FF,#C7D8FF)"><span class="text-[11px] text-primary/70">头条封面 2.35:1</span></div>';
        }
        return '';
      }

      function buildBody(text) {
        return text.split('\n').map((line, i) => {
          line = line.trim();
          if (!line) return '';
          if (line.indexOf('##') === 0) return '<p class="font-semibold text-offblack' + (i ? ' mt-3' : '') + '">' + line.replace(/^##\s*/, '') + '</p>';
          return '<p' + (i ? ' class="mt-2"' : '') + '>' + line + '</p>';
        }).join('');
      }
      function tagsHTML(p, d) {
        if (p.tagMax === 0) return '<div class="text-[12.5px] text-secondary px-3 py-2.5 rounded-lg border border-line">公众号无原生话题标签，靠正文关键词密度 + 文末「关注引导」沉淀</div>';
        const wrap = (w) => p.tag === '#话题#' ? '#' + w + '#' : (p.tag === '#话题' ? '#' + w : w);
        return '<div class="rp-tags flex flex-wrap items-center gap-2 px-2 py-2 rounded-lg border border-line">' +
          (d.tags || []).map((w) => '<span class="inline-flex items-center gap-1 h-7 pl-2.5 pr-1.5 rounded-lg bg-primary/10 text-primary text-sm">' + wrap(w) + '<button class="tag-del w-4 h-4 grid place-items-center rounded hover:bg-primary/20">×</button></span>').join('') +
          '<input class="rp-tag-input flex-1 min-w-20 h-7 px-1.5 text-sm outline-none placeholder:text-secondary/60" placeholder="加' + (p.tag === '关键词' ? '关键词' : '标签') + '…" /></div>';
      }

      function panelHTML(key) {
        const p = PLATFORMS[key], d = DEMO[key];
        const spec = [FORM_LABEL[p.primary] + '主推', '图片 ' + p.imgRatio, '标题≤' + p.title, (p.body === 0 ? '正文无上限' : '正文≤' + p.body), (p.tagMax ? '标签 ' + p.tag + '×' + p.tagMax : '无原生标签')].join(' · ');
        return '<div class="px-6 py-5">' +
          '<div class="text-[11.5px] text-muted">' + spec + (p.warn ? ' <span class="text-warning">· ⚠️经验值待核验</span>' : '') + '</div>' +
          '<p class="flex items-start gap-1.5 text-[12.5px] text-primary mt-1 mb-4"><svg viewBox="0 0 24 24" class="w-3.5 h-3.5 shrink-0 mt-0.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 14.5 9 21 9.5 16 14l1.5 7L12 17.5 6.5 21 8 14 3 9.5 9.5 9z"/></svg><span class="text-secondary">' + p.soul + '</span></p>' +
          media(key, p) +
          '<div class="flex items-center justify-between"><label class="text-xs text-secondary">标题</label><span class="text-[11px] text-muted tabular-nums"><span class="rp-tc">' + d.title.length + '</span>/' + p.title + '</span></div>' +
          '<input maxlength="' + p.title + '" value="' + d.title + '" class="rp-title mt-1 mb-4 w-full text-base font-display font-bold tracking-tight px-3 h-11 rounded-lg border border-line outline-none transition focus:border-primary focus:ring-2 focus:ring-primary/20" />' +
          '<label class="text-xs text-secondary">正文</label>' +
          '<div contenteditable="true" class="mt-1 mb-4 min-h-32 px-3.5 py-3 rounded-lg border border-line text-sm leading-relaxed outline-none transition focus:border-primary focus:ring-2 focus:ring-primary/20">' + buildBody(d.body) + '</div>' +
          '<label class="text-xs text-secondary">标签</label><div class="mt-1 mb-1">' + tagsHTML(p, d) + '</div>' +
          '<div class="flex items-center justify-end gap-2.5 mt-5 pt-4 border-t border-line">' +
            '<button data-toast="文案已复制到剪贴板" class="px-4 h-9 rounded-lg border border-line text-sm font-medium transition hover:bg-line/50">复制文案</button>' +
            '<a href="08-内容库.html?new=1" data-toast="' + p.name + '版已入库（演示）" class="px-4 h-9 rounded-lg bg-primary/10 text-primary text-sm font-medium grid place-items-center transition hover:bg-primary/15">这版入库</a>' +
          '</div>' +
        '</div>';
      }

      function tabBtn(key, on) {
        return '<button class="rtab h-9 px-3 rounded-lg text-[13px] font-medium whitespace-nowrap transition ' +
          (on ? 'bg-primary/10 text-primary' : 'text-secondary hover:bg-line/50') + '" data-plat="' + key + '">' + PLATFORMS[key].name + '</button>';
      }
      function setActive(key) {
        state.active = key;
        $('result-tabs').querySelectorAll('.rtab').forEach((b) => {
          const on = b.dataset.plat === key;
          b.className = 'rtab h-9 px-3 rounded-lg text-[13px] font-medium whitespace-nowrap transition ' + (on ? 'bg-primary/10 text-primary' : 'text-secondary hover:bg-line/50');
        });
        $('result-panels').querySelectorAll('.result-panel').forEach((d) => d.classList.toggle('hidden', d.dataset.plat !== key));
      }

      function show(stateName) {
        $('gen-empty').classList.toggle('hidden', stateName !== 'empty');
        $('gen-loading').classList.toggle('hidden', stateName !== 'loading');
        $('gen-result').classList.toggle('hidden', stateName !== 'result');
      }

      function buildResult(sel) {
        $('result-tabs').innerHTML = sel.map((k, i) => tabBtn(k, i === 0)).join('');
        $('result-panels').innerHTML = sel.map((k, i) => '<div class="result-panel' + (i ? ' hidden' : '') + '" data-plat="' + k + '">' + panelHTML(k) + '</div>').join('');
        state.active = sel[0];
      }

      function generate() {
        const sel = ORDER.filter((k) => state.platforms.indexOf(k) >= 0);
        if (!sel.length) { AO.toast('至少选 1 个发布平台', 'warn'); return; }
        show('loading');
        $('loading-text').textContent = '正在为 ' + sel.length + ' 个平台各生成一版…';
        $('loading-pills').innerHTML = sel.map((k) => '<span class="px-2.5 h-6 grid place-items-center rounded-lg bg-primary/10 text-primary text-xs font-medium">' + PLATFORMS[k].name + '</span>').join('');
        setTimeout(() => { buildResult(sel); show('result'); AO.toast('已为 ' + sel.length + ' 个平台各生成一版（演示）', 'success'); }, 1100);
      }

      // —— 事件 ——
      $('gen-platform-pick').addEventListener('click', (e) => {
        const b = e.target.closest('.gp'); if (!b) return;
        const k = b.dataset.val, idx = state.platforms.indexOf(k);
        if (idx >= 0) { if (state.platforms.length === 1) { AO.toast('至少保留 1 个平台', 'warn'); return; } state.platforms.splice(idx, 1); }
        else state.platforms.push(k);
        paintPicks();
      });
      $('gen-run').addEventListener('click', generate);
      $('result-tabs').addEventListener('click', (e) => { const b = e.target.closest('.rtab'); if (b) setActive(b.dataset.plat); });

      // 结果面板内编辑（委托：标题计数 / 标签增删 / 图片操作）
      const panels = $('result-panels');
      panels.addEventListener('input', (e) => {
        const t = e.target;
        if (t.classList.contains('rp-title')) { const c = t.closest('.result-panel').querySelector('.rp-tc'); if (c) c.textContent = t.value.length; }
      });
      panels.addEventListener('click', (e) => {
        const del = e.target.closest('.tag-del'); if (del) { del.closest('span').remove(); return; }
        const act = e.target.closest('.img-act'); if (act) AO.toast(act.dataset.act === 'download' ? '该图已开始下载（演示）' : '正在重生成这张（演示）', act.dataset.act === 'download' ? 'success' : 'info');
      });
      panels.addEventListener('keydown', (e) => {
        if (e.key !== 'Enter') return;
        const inp = e.target.closest('.rp-tag-input'); if (!inp) return;
        e.preventDefault();
        let v = inp.value.trim().replace(/^#/, '').replace(/#$/, ''); if (!v) return;
        const key = inp.closest('.result-panel').dataset.plat, p = PLATFORMS[key];
        const label = p.tag === '#话题#' ? '#' + v + '#' : (p.tag === '#话题' ? '#' + v : v);
        const span = document.createElement('span');
        span.className = 'inline-flex items-center gap-1 h-7 pl-2.5 pr-1.5 rounded-lg bg-primary/10 text-primary text-sm';
        span.innerHTML = label + '<button class="tag-del w-4 h-4 grid place-items-center rounded hover:bg-primary/20">×</button>';
        inp.parentNode.insertBefore(span, inp); inp.value = '';
      });

      // —— 上下文：从诊断缺口带入选题 ——
      const q = new URLSearchParams(location.search);
      if (q.get('from') === 'diag') {
        $('gen-from').classList.remove('hidden');
        const gap = q.get('gap');
        if (gap) $('gen-topic').value = gap;
      }

      paintPicks();
      show('empty');
    })();
  </script>
</body>
</html>
