<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>首答 AnswerOne · 登录</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/theme.js?v=20260529"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="font-sans bg-page-wash text-offblack antialiased min-h-screen grid place-items-center px-4 relative overflow-hidden">

  <div class="pointer-events-none absolute -top-40 left-1/2 -translate-x-1/2 w-[720px] h-[720px] rounded-full bg-brand-gradient opacity-[0.12] blur-3xl"></div>
  <div class="pointer-events-none absolute -bottom-44 -right-24 w-[460px] h-[460px] rounded-full bg-accent opacity-[0.10] blur-3xl"></div>

  <main class="relative z-10 w-full max-w-[400px]">
    <!-- 产品标识 -->
    <div class="flex items-center gap-2.5 justify-center mb-8">
      <div class="w-9 h-9 rounded-xl bg-brand-gradient text-white grid place-items-center font-display font-bold tracking-tighter text-lg shadow-brand">答</div>
      <div class="leading-tight text-left">
        <div class="font-display font-bold text-offblack tracking-tighter text-lg">首答</div>
        <div class="text-[11px] text-secondary tracking-widest">ANSWERONE</div>
      </div>
    </div>

    <!-- 登录卡 -->
    <div class="bg-surface border border-line rounded-2xl shadow-elevated p-8">
      <h1 class="font-display text-2xl font-bold tracking-tighter mb-1">登录首答</h1>
      <p class="text-sm text-secondary mb-6">成为 AI 的那个答案 · 学员工作台</p>

      <form class="space-y-4" onsubmit="return false">
        <!-- 手机号 -->
        <label class="block">
          <span class="text-sm font-medium text-offblack">手机号</span>
          <input type="tel" value="138 1234 5678" placeholder="请输入手机号"
            class="mt-1.5 w-full h-11 px-3.5 rounded-lg bg-surface border border-line text-offblack placeholder:text-secondary/60
                   outline-none transition focus:border-primary focus:ring-2 focus:ring-primary/20" />
        </label>

        <!-- 验证码 + 获取（倒计时 = Disabled 态示例） -->
        <label class="block">
          <span class="text-sm font-medium text-offblack">短信验证码</span>
          <div class="mt-1.5 flex gap-2">
            <input type="text" inputmode="numeric" placeholder="短信验证码"
              class="flex-1 h-11 px-3.5 rounded-lg bg-surface border border-line text-offblack placeholder:text-secondary/60
                     outline-none transition focus:border-primary focus:ring-2 focus:ring-primary/20" />
            <button type="button" id="code-btn"
              class="shrink-0 px-4 h-11 rounded-lg border border-primary/40 text-sm font-medium text-primary bg-canvas
                     transition hover:bg-primary/5 active:bg-primary/10
                     disabled:opacity-60 disabled:cursor-not-allowed disabled:text-secondary disabled:border-line">获取验证码</button>
          </div>
        </label>

        <!-- 邀请码（仅首次登录显示） -->
        <label class="block">
          <span class="text-sm font-medium text-offblack">邀请码</span>
          <span class="text-xs text-secondary ml-1">首次登录必填</span>
          <input type="text" value="GEO-2026-A1" placeholder="邀请码（首次登录必填）"
            class="mt-1.5 w-full h-11 px-3.5 rounded-lg bg-surface border border-line text-offblack placeholder:text-secondary/60
                   outline-none transition focus:border-primary focus:ring-2 focus:ring-primary/20" />
        </label>

        <!-- 主按钮：Enabled，含 hover/active/focus 态 -->
        <a href="03-工作台首页.html"
          class="mt-2 w-full h-11 rounded-xl bg-brand-gradient text-white text-sm font-semibold grid place-items-center shadow-brand
                 transition-transform hover:-translate-y-0.5 active:translate-y-0
                 outline-none focus-visible:ring-2 focus-visible:ring-primary/40">登录</a>
      </form>

      <p class="mt-6 text-center text-xs text-secondary">仅向培训学员开放 · 邀请制</p>
    </div>

    <p class="mt-6 text-center text-xs text-secondary/80">登录即表示同意《服务协议》与《隐私政策》</p>
  </main>

  <script>
    // 01 登录 · 演示版：验证码倒计时 + 轻提示
    (function () {
      function toast(msg) {
        const el = document.createElement('div');
        el.className = 'fixed top-5 left-1/2 -translate-x-1/2 z-50 px-4 py-2.5 rounded-xl text-[13px] font-medium ' +
          'bg-brand-gradient text-white shadow-brand transition-all duration-300 opacity-0 -translate-y-2';
        el.textContent = msg;
        document.body.appendChild(el);
        requestAnimationFrame(() => el.classList.remove('opacity-0', '-translate-y-2'));
        setTimeout(() => { el.classList.add('opacity-0', '-translate-y-2'); setTimeout(() => el.remove(), 320); }, 2000);
      }
      const btn = document.getElementById('code-btn');
      btn.addEventListener('click', () => {
        if (btn.disabled) return;
        toast('验证码已发送（演示码 8888）');
        btn.disabled = true;
        let n = 60;
        btn.textContent = `重发 ${n}s`;
        const timer = setInterval(() => {
          n--;
          if (n <= 0) { clearInterval(timer); btn.disabled = false; btn.textContent = '重新获取'; }
          else btn.textContent = `重发 ${n}s`;
        }, 1000);
      });
    })();
  </script>
</body>
</html>
